[package]
name = "tauri-plugin-downloader"
description = "High-performance resumable downloader for Delta Comic"
authors = { workspace = true }
edition = { workspace = true }
license = { workspace = true }
repository = { workspace = true }
rust-version = { workspace = true }
version = { workspace = true }
links = "tauri-plugin-downloader"

[package.metadata.platforms]
windows = { level = "full", notes = "" }
linux = { level = "full", notes = "" }
macos = { level = "full", notes = "" }
android = { level = "full", notes = "" }
ios = { level = "full", notes = "" }

[features]
default = ["bittorrent"]
bittorrent = ["dep:librqbit"]

[build-dependencies]
tauri-plugin = { workspace = true, features = ["build"] }

[dependencies]
async-trait = "0.1.89"
base64 = "0.22.1"
bytes = "1.11.1"
futures-util = "0.3.32"
hex = "0.4.3"
httpdate = "1.0.3"
keyring-core = "1.0.0"
librqbit = { version = "=9.0.0-rc.0", default-features = false, features = [
  "rust-tls",
], optional = true }
log = { workspace = true }
md-5 = "0.10.6"
rand = "0.9.2"
reqwest = { version = "0.13.4", default-features = false, features = ["json", "rustls", "stream"] }
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = "0.10.9"
sqlx = { version = "0.8.6", default-features = false, features = ["runtime-tokio", "sqlite"] }
tauri = { workspace = true }
tempfile = "3.27.0"
thiserror = "2.0.18"
tokio = { workspace = true, features = [
  "fs",
  "io-util",
  "macros",
  "rt-multi-thread",
  "sync",
  "time",
] }
tokio-util = { version = "0.7.18", features = ["rt"] }
url = "2.5.8"
uuid = { version = "1.23.0", features = ["serde", "v4"] }
zeroize = "1.8.2"

[target.'cfg(target_os = "android")'.dependencies]
android-native-keyring-store = "1.0.0"
jni = "0.21.1"
ndk-context = "0.1.1"

[target.'cfg(target_os = "macos")'.dependencies]
apple-native-keyring-store = { version = "1.0.1", features = ["keychain"] }

[target.'cfg(target_os = "windows")'.dependencies]
windows-native-keyring-store = { version = "1.1.0", default-features = false }
windows-sys = { version = "0.61.2", features = ["Win32_Storage_FileSystem"] }

[target.'cfg(not(target_os = "android"))'.dependencies]
rfd = { version = "0.15.4", default-features = false, features = ["tokio", "xdg-portal"] }

[target.'cfg(unix)'.dependencies]
libc = "0.2.185"

[dev-dependencies]
axum = "0.8.8"