<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>Delta Comic</title>
    <meta name="description" content="阿赖耶识" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover"
    />
    <link rel="shortcut icon" href="/favicon.png" type="image/x-icon" />
    <link rel="apple-touch-icon" href="/favicon.png" type="image/x-icon" />
    <style>
      /* The splash entry intentionally keeps its critical CSS inline. */
      :root {
        --p-color: #fb7299;

        color-scheme: light dark;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, 'Segoe UI', Arial, Roboto,
          sans-serif;
        background: #fff;
        color: #111;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #splash {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      #splash {
        position: fixed;
        inset: 0;
        background: inherit;
      }

      .splash-portrait,
      .splash-desktop {
        position: absolute;
        inset: 0;
      }

      .splash-portrait {
        display: none;
      }

      .splash-desktop {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 10%;
      }

      .splash-desktop-title {
        width: 100%;
        font-family:
          'Snell Roundhand', 'Brush Script MT', 'Segoe Script', 'URW Chancery L', cursive;
        font-size: clamp(4rem, 13vw, 13rem);
        font-style: italic;
        font-weight: 800;
        line-height: 0.9;
        text-align: center;
        white-space: nowrap;
      }

      .splash-desktop-title,
      .splash-portrait-title {
        color: var(--p-color);
      }

      .splash-portrait-image {
        position: absolute;
        top: 0;
        left: 0;
        display: block;
        width: 100%;
        height: 66.6667%;
        object-fit: contain;
      }

      .splash-portrait-title {
        position: absolute;
        right: 1rem;
        bottom: max(3rem, calc(env(safe-area-inset-bottom) + 2rem));
        left: 1rem;
        font-size: 1.5rem;
        font-weight: 600;
        line-height: 1rem;
        text-align: center;
      }

      #main-entry {
        position: fixed;
        z-index: 1;
        inset: 0;
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
        opacity: 0;
        pointer-events: none;
        transition: opacity 160ms ease-out;
      }

      #main-entry[data-ready='true'] {
        opacity: 1;
        pointer-events: auto;
      }

      @media (orientation: portrait) {
        .splash-portrait {
          display: block;
        }

        .splash-desktop {
          display: none;
        }
      }

      @media (prefers-color-scheme: dark) {
        :root {
          background: #000;
          color: #fff;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        #main-entry {
          transition: none;
        }
      }
    </style>
  </head>

  <body>
    <main id="splash" role="status" aria-label="Delta Comic" aria-busy="true">
      <div class="splash-portrait" aria-hidden="true">
        <img class="splash-portrait-image" src="/setup.avif" alt="" fetchpriority="high" />
        <div class="splash-portrait-title">Delta Comic</div>
      </div>
      <div class="splash-desktop" aria-hidden="true">
        <div class="splash-desktop-title">Delta Comic</div>
      </div>
    </main>
    <iframe id="main-entry" title="Delta Comic" hidden></iframe>
    <script type="module" src="./src/entries/splash.ts"></script>
  </body>
</html>
