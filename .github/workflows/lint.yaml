name: 风格检查

on:
  push:
    paths:
      - 'packages/**'
      - '.github/workflows/lint.yaml'
      - '.editorconfig'
      - '.node-version'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'words.txt'
      - '*.config.ts'
      - 'tsconfig*.json'
  pull_request:
    paths:
      - 'packages/**'
      - '.github/workflows/lint.yaml'
      - '.editorconfig'
      - '.node-version'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'words.txt'
      - '*.config.ts'
      - 'tsconfig*.json'

permissions:
  contents: read

jobs:
  lint:
    name: Web lint 与 fmt
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: .node-version
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Lint and format check
        run: |
          vp run lib-build
          vp check

  rust:
    name: Rust Clippy 与 fmt
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Check Rust formatting
        run: cargo fmt --all --check

      - name: Run Clippy
        env:
          CARGO_BUILD_JOBS: 2
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  android:
    name: Android lint 与 Kotlin fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust metadata toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust registry
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK components
        run: sdkmanager 'platforms;android-36' 'build-tools;36.0.0'

      - name: Resolve Tauri Android library
        shell: bash
        run: |
          set -euo pipefail
          manifest_path="$(cargo metadata --locked --format-version 1 | jq -r 'first(.packages[] | select(.name == "tauri") | .manifest_path) // empty')"
          if [ -z "$manifest_path" ]; then
            echo 'Unable to resolve the Tauri crate from Cargo metadata.' >&2
            exit 1
          fi
          tauri_android_path="$(dirname "$manifest_path")/mobile/android"
          test -f "$tauri_android_path/build.gradle.kts"
          echo "TAURI_ANDROID_LIBRARY_PATH=$tauri_android_path" >> "$GITHUB_ENV"

      - name: Check Android lint and Kotlin formatting
        run: |
          chmod +x ./packages/app/src-tauri/gen/android/gradlew
          ./packages/app/src-tauri/gen/android/gradlew \
            -p packages/downloader/android \
            ktlintCheck \
            lintDebug \
            --no-daemon \
            --max-workers=2