name: 构建和发布

on:
  push:
    branches:
      - 'main'
      - 'next'
  workflow_dispatch:
    inputs:
      recover_withdrawn_2x:
        description: '使用已撤回 2.0.0 的 semantic-release note 恢复 3.x 发布序列'
        required: false
        default: false
        type: boolean

permissions:
  actions: read
  contents: write
  id-token: write
  issues: write
  packages: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  plan:
    if: github.ref_name == 'main' || github.ref_name == 'next'
    runs-on: ubuntu-latest
    outputs:
      has-release: ${{ steps.release-plan.outputs.has-release }}
      version: ${{ steps.release-plan.outputs.version }}
      channel: ${{ steps.release-plan.outputs.channel }}
      recovery-required: ${{ steps.release-plan.outputs.recovery-required }}
    env:
      HUSKY: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: .node-version
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Build workspace libraries
        run: vp run lib-build

      - name: Resolve semantic release plan
        id: release-plan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DELTA_RELEASE_RECOVERY: ${{ inputs.recover_withdrawn_2x && 'withdrawn-2x' || '' }}
        run: vp run --no-cache release:dry-run

      - name: Synchronize release build version
        if: steps.release-plan.outputs.has-release == 'true'
        run: node ./script/set-version.mts "${{ steps.release-plan.outputs.version }}"

      - name: Build release workspace libraries
        if: steps.release-plan.outputs.has-release == 'true'
        run: vp run lib-build

      - name: Upload workspace libraries
        if: steps.release-plan.outputs.has-release == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: workspace-libraries
          path: |
            packages/app/public/runtime
            packages/db/dist
            packages/downloader/dist
            packages/logger/dist
            packages/model/dist
            packages/plugin/dist
            packages/ui/dist
            packages/ui/dist-vite
            packages/utils/dist
          if-no-files-found: error
          retention-days: 1

      - name: No release required
        if:
          steps.release-plan.outputs.has-release != 'true' &&
          steps.release-plan.outputs.recovery-required != 'true'
        run: echo 'No releasable Conventional Commit was found.'

      - name: Recovery required
        if: steps.release-plan.outputs.recovery-required == 'true'
        run: echo 'Run this workflow manually with recover_withdrawn_2x enabled.'

  android:
    needs: plan
    if: needs.plan.outputs.has-release == 'true'
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
      RELEASE_VERSION: ${{ needs.plan.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: .node-version
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Setup pnpm for Android Tauri lifecycle
        uses: pnpm/action-setup@v4

      - name: Synchronize build version
        run: node ./script/set-version.mts "${{ needs.plan.outputs.version }}"

      - name: Download workspace libraries
        uses: actions/download-artifact@v7
        with:
          name: workspace-libraries
          path: packages

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi

      - name: Setup JDK 23
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '23'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3.2.2
        with:
          log-accepted-android-sdk-licenses: false

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1.5.0
        with:
          ndk-version: r29
          link-to-sdk: true
          local-cache: true
          add-to-path: true

      - name: Initialize Android project
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          echo "${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin" >> "$GITHUB_PATH"
          echo "ANDROID_HOME=$ANDROID_HOME" >> "$GITHUB_ENV"
          echo "NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> "$GITHUB_ENV"

          cd packages/app
          pnpm tauri android init --ci --skip-targets-install

      - name: Make Gradle wrapper executable
        run: chmod +x ./packages/app/src-tauri/gen/android/gradlew

      - name: Build Android App
        id: build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          cd packages/app
          pnpm tauri android build --ci --target aarch64 armv7

      - name: Restore Android keystore
        env:
          KEYSTORE_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          printf '%s' '${{ secrets.ANDROID_KEY_BASE64 }}' | base64 --decode > "$RUNNER_TEMP/keystore.p12"
          FILESIZE=$(stat --format='%s' "$RUNNER_TEMP/keystore.p12" || echo 0)
          if [ "$FILESIZE" -lt 1000 ]; then
            echo "Android keystore is unexpectedly small ($FILESIZE bytes)." >&2
            exit 1
          fi
          cat > ./packages/app/src-tauri/gen/android/keystore.properties <<EOF
          storeFile=$RUNNER_TEMP/keystore.p12
          storePassword=$KEYSTORE_PASS
          keyPassword=$KEYSTORE_PASS
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          EOF

      - name: Install APK signer
        run: sudo apt-get update && sudo apt-get install -y apksigner

      - name: Sign APK
        env:
          KEYSTORE_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail
          APK_SRC='./packages/app/src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk'
          if [ ! -f "$APK_SRC" ]; then
            echo "APK not found at $APK_SRC" >&2
            exit 1
          fi
          mkdir -p dist/release
          apksigner sign \
            --ks "$RUNNER_TEMP/keystore.p12" \
            --ks-type PKCS12 \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass "pass:$KEYSTORE_PASS" \
            --key-pass "pass:$KEYSTORE_PASS" \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out "./dist/release/delta-comic-$RELEASE_VERSION-android.apk" \
            "$APK_SRC"
          apksigner verify "./dist/release/delta-comic-$RELEASE_VERSION-android.apk"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-android
          path: dist/release/*.apk
          if-no-files-found: error

  desktop:
    needs: plan
    if: needs.plan.outputs.has-release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
            rust-targets: ''
          - platform: windows-latest
            args: ''
            rust-targets: ''
    runs-on: ${{ matrix.platform }}
    env:
      HUSKY: 0
      RELEASE_VERSION: ${{ needs.plan.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: .node-version
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Synchronize build version
        run: node ./script/set-version.mts "${{ needs.plan.outputs.version }}"

      - name: Configure Windows MSI version
        if: matrix.platform == 'windows-latest'
        run: node ./script/windows-msi-version.mts "${{ needs.plan.outputs.version }}"

      - name: Download workspace libraries
        uses: actions/download-artifact@v7
        with:
          name: workspace-libraries
          path: packages

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build desktop app
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          args: ${{ matrix.args }}
          projectPath: packages/app
          retryAttempts: 0
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: release-desktop-[platform]-[arch]-[bundle]

  release:
    needs: [plan, android, desktop]
    if: needs.plan.outputs.has-release == 'true'
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: .node-version
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: release-*
          path: dist/release
          merge-multiple: true

      - name: Verify release artifacts
        run: test -n "$(find dist/release -type f -print -quit)"

      - name: Configure git author
        run: |
          git config user.name 'delta-comic-bot'
          git config user.email 'delta-comic-bot@proton.me'

      - name: Configure package registry authentication
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: vp pm config set '//npm.pkg.github.com/:_authToken' "$GITHUB_TOKEN"

      - name: Publish semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
          DELTA_RELEASE_RECOVERY: ${{ inputs.recover_withdrawn_2x && 'withdrawn-2x' || '' }}
        run: vp run --no-cache release