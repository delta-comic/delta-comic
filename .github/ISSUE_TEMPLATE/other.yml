name: 其他
description: 不符合其他的选择(请仔细思考!)
title: '[其他] <简易描述>'
body:
  - type: markdown
    attributes:
      value: |
        提交时请将上方标题中 `<>` 占位符替换为实际描述(不保留尖括号)。

  - type: input
    id: tag
    attributes:
      label: 应用版本
      description: 启动应用时的`核心版本`的内容
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 详细描述
    validations:
      required: true